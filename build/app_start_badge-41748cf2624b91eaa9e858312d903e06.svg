<svg width="220" height="48" viewBox="0 0 220 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Light theme: blauer Hintergrund, weißer Text */
      .bg   { fill: #005a94; }
      .ring { stroke: white; fill: none; }
      .tri  { fill: white; }
      .sep  { stroke: rgba(255,255,255,0.3); }
      .lbl  { fill: rgba(255,255,255,0.72); }
      .txt  { fill: white; }

      /* Dark theme: etwas helleres Blau damit Badge auf dunklem Hintergrund gut aussieht */
      @media (prefers-color-scheme: dark) {
        .bg   { fill: #1a7abf; }
        .ring { stroke: white; fill: none; }
        .tri  { fill: white; }
        .sep  { stroke: rgba(255,255,255,0.3); }
        .lbl  { fill: rgba(255,255,255,0.72); }
        .txt  { fill: white; }
      }
    </style>
  </defs>

  <!-- Hintergrund -->
  <rect class="bg" width="220" height="48" rx="8"/>

  <!-- Play-Kreis -->
  <circle class="ring" cx="30" cy="24" r="14" stroke-width="1.8"/>
  <!-- Play-Dreieck -->
  <polygon class="tri" points="26,18 26,30 38,24"/>

  <!-- Trennlinie -->
  <line class="sep" x1="54" y1="10" x2="54" y2="38" stroke-width="1"/>

  <!-- Label oben -->
  <text class="lbl" x="138" y="18"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.07em"
        text-anchor="middle" dominant-baseline="middle">INTERAKTIV</text>

  <!-- Haupttext -->
  <text class="txt" x="138" y="33"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="600"
        text-anchor="middle" dominant-baseline="middle">App starten</text>
</svg>
